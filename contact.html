<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dell OptiPlex 7050 SFF | Contact Us</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- Shared Styles (Copied from Optiplex 7050 sff Updated.html) --- */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            cursor: none !important;
        }

        /* Reinforce cursor hiding on all interactive elements and states */
        a, button, input, textarea, .submit-btn, *:active {
            cursor: none !important;
        }

        html { scrollbar-width: none; -ms-overflow-style: none; scroll-behavior: smooth; }
        html::-webkit-scrollbar { display: none; }

        html.no-smooth { scroll-behavior: auto !important; }
        body.is-dragging { user-select: none; }

        :root {
            --bg: #050505;
            --dell-blue: #0076ce;
            --neon-green: #39ff14; /* Gen Alpha 'Aesthetic' */
            --glass: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: transparent; /* Allow canvas to be visible */
            color: var(--text-main);
            overflow-x: hidden;
        }

        h1 { font-size: clamp(3rem, 8vw, 6rem); font-weight: 900; letter-spacing: -2px; }
        h2 { font-size: clamp(2rem, 5vw, 3.5rem); }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }

        /* Navigation Bar */
        .nav-bar {
            background: rgba(0,0,0,0.8);
            padding: 20px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #111;
        }
        .nav-bar a {
            color: white; text-decoration: none; margin: 0 15px; font-weight: 700; transition: color 0.3s;
        }
        .nav-bar a:hover { color: var(--dell-blue); }

        /* Custom Scroll Indicator */
        .scroll-tracker {
            position: fixed;
            right: 10.5px;
            top: 10vh;
            height: 80vh;
            width: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            z-index: 9999;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), right 0.3s ease, background 0.3s ease;
        }

        /* Grows wider on hover or while dragging */
        .scroll-tracker:hover,
        body.is-dragging .scroll-tracker {
            width: 16px;
            right: 5.5px; /* Adjusted to keep it centered on its axis */
            background: rgba(255, 255, 255, 0.2);
        }

        .scroll-bar {
            position: relative;
            width: 100%;
            height: 0%;
            background: var(--dell-blue);
            border-radius: 10px;
            box-shadow: 0 0 15px var(--dell-blue);
            transition: height 0.1s ease, background 0.4s ease, box-shadow 0.4s ease;
        }

        /* The Draggable Handle */
        .scroll-handle {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 20px;
            background: #fff;
            border: 2px solid var(--dell-blue);
            border-radius: 10px;
            transition: width 0.2s ease, height 0.2s ease, border-color 0.4s ease, box-shadow 0.4s ease;
            box-shadow: 0 0 10px var(--dell-blue);
        }

        .scroll-tracker:hover .scroll-handle,
        body.is-dragging .scroll-handle {
            width: 20px; /* Matches diameter for better grab feel */
            height: 30px;
            bottom: -15px;
        }

        /* Custom Cursor Style */
        .custom-cursor {
            width: 20px;
            height: 20px;
            border: 2px solid var(--dell-blue);
            background-color: black;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: background-color 0.1s, border-color 0.1s, opacity 0.2s;
            opacity: 0;
        }
        .custom-cursor.flash {
            background-color: white;
            border-color: white;
        }

        /* Particle Background Canvas */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: var(--bg);
            pointer-events: none;
            will-change: transform;
        }

        /* --- Contact Form Specific Styles --- */
        #contact-section {
            height: calc(100vh - 72px); /* Full height minus navbar */
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .contact-form {
            max-width: 700px;
            margin: 30px auto 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: var(--text-main);
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s, background-color 0.3s;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="email"]:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--dell-blue);
            background-color: rgba(0, 0, 0, 0.5);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            background: var(--dell-blue);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(0, 118, 206, 0.4);
            border: none;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            background: #005da3;
            box-shadow: 0 15px 30px rgba(0, 118, 206, 0.6);
        }

        .home-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 35px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            border-radius: 50px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(5px);
        }
        .home-btn:hover { 
            background: var(--dell-blue); 
            border-color: var(--dell-blue);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 118, 206, 0.4);
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="Optiplex 7050 sff Updated.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="tictactoe.html">Play Game</a>
        <a href="contact.html">Contact</a>
        <a href="digital-ocarina.html">Ocarina</a>
    </div>

    <canvas id="particle-canvas"></canvas>

    <section id="contact-section">
        <div class="container">
            <h2>Get in <span style="color:var(--dell-blue)">Touch</span></h2>
            <p style="font-size: 1.2rem; color: var(--text-dim); max-width: 700px; margin: 20px auto 0 auto;">
                Have questions about the OptiPlex 7050 SFF or want to share your build? We'd love to hear from you!
            </p>

            <form class="contact-form" action="thankyou.html" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
            <a href="Optiplex 7050 sff Updated.html" class="home-btn">Return to Home</a>
        </div>
    </section>

    <script>
        // Particle Background Logic (Copied from Optiplex 7050 sff Updated.html)
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };
        let isLowPowerMode = false;
        let animationId = null;

        function initPowerManagement() {
            const updatePowerStatus = (battery = null) => {
                const isHidden = document.hidden;
                const isLowBattery = battery ? (battery.level <= 0.2 && !battery.charging) : false;
                
                const prevMode = isLowPowerMode;
                isLowPowerMode = isHidden || isLowBattery;

                if (prevMode && !isLowPowerMode && !animationId) {
                    animateParticles();
                }
            };

            document.addEventListener('visibilitychange', () => updatePowerStatus());

            if ('getBattery' in navigator) {
                navigator.getBattery().then(battery => {
                    battery.addEventListener('levelchange', () => updatePowerStatus(battery));
                    battery.addEventListener('chargingchange', () => updatePowerStatus(battery));
                    updatePowerStatus(battery);
                }).catch(() => updatePowerStatus());
            } else { updatePowerStatus(); }
        }

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            const particleCount = Math.min(Math.floor((canvas.width * canvas.height) / 25000), 100);
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 1.5 + 0.5
                });
            }
        }

        function animateParticles() {
            if (isLowPowerMode) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                animationId = null;
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const connectionLimitSq = 150 * 150;
            ctx.fillStyle = 'rgba(0, 118, 206, 0.4)';
            
            particles.forEach(p => {
                if (mouse.x !== null && mouse.y !== null) {
                    const dx = p.x - mouse.x;
                    const dy = p.y - mouse.y;
                    const distSq = dx * dx + dy * dy;
                    const forceRadius = 120;
                    if (distSq < forceRadius * forceRadius) {
                        const force = (forceRadius - Math.sqrt(distSq)) / forceRadius;
                        p.x += (dx / Math.sqrt(distSq)) * force * 5;
                        p.y += (dy / Math.sqrt(distSq)) * force * 5;
                    }
                }

                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            
            ctx.strokeStyle = 'rgba(0, 118, 206, 0.1)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distSq = dx * dx + dy * dy;
                    if (distSq < connectionLimitSq) {
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                    }
                }
            }
            ctx.stroke();
            animationId = requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', initParticles);
        initPowerManagement();
        initParticles();
        animateParticles();

        // Custom Cursor Implementation (Copied from Optiplex 7050 sff Updated.html)
        const cursor = document.createElement('div');
        cursor.classList.add('custom-cursor');
        document.body.appendChild(cursor);

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursor.style.opacity = '1';
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        document.addEventListener('mousedown', () => cursor.classList.add('flash'));
        document.addEventListener('mouseup', () => cursor.classList.remove('flash'));

        // Prevent default drag behavior to stop system cursor from appearing
        window.addEventListener('dragstart', (e) => e.preventDefault());

        document.addEventListener('mouseleave', () => {
            cursor.style.opacity = '0';
            mouse.x = null;
            mouse.y = null;
        });
    </script>
</body>
</html>
